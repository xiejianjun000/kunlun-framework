# ============================================
# OpenTaiji - README 自动更新工作流
# 当代码、配置或版本变更时，自动更新 README
# 使用 GITHUB_TOKEN 标准配置，无需额外设置
# ============================================

name: Auto Update README

on:
  push:
    branches: [main, master, develop]
    paths:
      # 版本变更
      - '**/package.json'
      # CHANGELOG 变更
      - 'CHANGELOG.md'
      # 源码变更影响模块列表
      - '**/src/**/*.ts'
      # 测试覆盖率变更
      - '**/coverage/**'
      # 配置变更
      - '**/markdown.config.js'
      - '**/jest.config.js'
    paths-ignore:
      # 避免无限循环
      - '**/README.md'
      - '**/*.md'

  # 允许手动触发
  workflow_dispatch:

# 权限配置 - 使用 GITHUB_TOKEN 默认权限，无需额外配置
permissions:
  contents: write  # 需要写权限来提交 README 变更

jobs:
  update-readme:
    name: 自动更新 README 文档
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v6
        with:
          # 获取完整历史以支持 git 操作
          fetch-depth: 0
          # 使用 GITHUB_TOKEN - 无需额外配置 Secrets
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: 安装依赖
        run: |
          if [ -f "output/p-mo6gxim524edn6-worker3/package-lock.json" ]; then
            cd output/p-mo6gxim524edn6-worker3
            npm ci
          elif [ -f "package-lock.json" ]; then
            npm ci
          fi
          echo "✅ 依赖安装完成"

      - name: 运行 markdown-magic 更新 README
        id: update
        run: |
          if [ -f "output/p-mo6gxim524edn6-worker3/package.json" ]; then
            cd output/p-mo6gxim524edn6-worker3
            if npm run | grep -q "docs:update"; then
              npm run docs:update
            fi
          fi
          echo "status=success" >> $GITHUB_OUTPUT
          echo "✅ README 更新脚本执行完成"

      - name: 检查是否有变更
        id: git-diff
        run: |
          git diff --exit-code README.md > /dev/null
          if [ $? -eq 1 ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "✅ README.md 有更新内容"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "ℹ️ README.md 无变更，跳过提交"
          fi

      - name: 配置 Git 身份
        if: steps.git-diff.outputs.changed == 'true'
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          echo "✅ Git 身份配置完成"

      - name: 提交变更到仓库
        if: steps.git-diff.outputs.changed == 'true'
        run: |
          git add README.md
          git commit -m "docs: 自动更新 README [skip ci]" -m "Auto-generated by markdown-magic via GitHub Actions"
          git push origin ${{ github.ref_name }}
          echo "✅ 变更已提交并推送"

      - name: 输出执行结果
        run: |
          echo "========================================"
          echo "📊 执行结果总结"
          echo "========================================"
          echo "状态: ${{ steps.update.outputs.status }}"
          echo "是否有变更: ${{ steps.git-diff.outputs.changed }}"
          echo "触发分支: ${{ github.ref_name }}"
          echo "提交者: ${{ github.actor }}"
          echo "使用 Token: GITHUB_TOKEN (系统默认)"
          echo "========================================"
          echo "ℹ️ 无需任何手动配置，GITHUB_TOKEN 由 GitHub 自动提供"
