name: OpenTaiji CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    name: TypeScript 类型检查

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 安装依赖
        working-directory: ./output/p-mo6gxim524edn6-worker3
        run: npm ci

      - name: TypeScript 类型检查
        working-directory: ./output/p-mo6gxim524edn6-worker3
        run: npx tsc --noEmit

  unit-tests:
    runs-on: ubuntu-latest
    name: 单元测试

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 安装依赖
        working-directory: ./output/p-mo6gxim524edn6-worker3
        run: npm ci

      - name: 运行单元测试
        working-directory: ./output/p-mo6gxim524edn6-worker3
        run: npm run test:coverage
        env:
          CI: true
