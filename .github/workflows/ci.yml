name: OpenTaiji CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    name: 项目验证

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 安装依赖
        run: npm ci || npm install

      - name: 验证项目结构
        run: |
          echo "=== OpenTaiji 项目验证 ==="
          echo "文件数: $(find . -not -path './.git/*' -not -path './node_modules/*' -type f | wc -l)"
          echo "目录数: $(find . -not -path './.git/*' -not -path './node_modules/*' -type d | wc -l)"
          if [ -f "README.md" ]; then echo "✅ README.md 存在"; fi
          if [ -f "package.json" ]; then echo "✅ package.json 存在"; fi
          if [ -f "LICENSE" ]; then echo "✅ LICENSE 存在"; fi
          if [ -d ".github/workflows" ]; then echo "✅ CI 工作流存在"; fi
