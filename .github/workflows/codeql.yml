# ============================================
# OpenTaiji - CodeQL 代码安全扫描
# 每周自动扫描代码漏洞和安全问题
# ============================================

name: CodeQL Security Scan

on:
  # 每周日凌晨 2 点自动扫描
  schedule:
    - cron: '0 18 * * 0'  # UTC 时间 18:00 = 北京时间 02:00

  # 每次推送到 main/master 分支时扫描
  push:
    branches: [main, master]
    paths:
      - '**/*.ts'
      - '**/*.js'
      - '**/*.tsx'
      - '**/*.jsx'
      - '**/package.json'

  # 每次 PR 时扫描
  pull_request:
    branches: [main, master]
    paths:
      - '**/*.ts'
      - '**/*.js'
      - '**/*.tsx'
      - '**/*.jsx'

  # 允许手动触发
  workflow_dispatch:

# 权限配置
permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: CodeQL 安全分析
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        # 支持的语言：javascript (包含 TypeScript)
        language: ['javascript-typescript']

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 初始化 CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # CodeQL 查询配置 - 使用标准安全查询集
          queries: security-and-quality

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: 安装依赖
        run: |
          if [ -f "output/p-mo6gxim524edn6-worker3/package-lock.json" ]; then
            cd output/p-mo6gxim524edn6-worker3
            npm ci
          elif [ -f "package-lock.json" ]; then
            npm ci
          fi
          echo "✅ 依赖安装完成"

      - name: 构建项目（TypeScript 编译）
        run: |
          if [ -f "output/p-mo6gxim524edn6-worker3/tsconfig.json" ]; then
            cd output/p-mo6gxim524edn6-worker3
            if npm run | grep -q "build"; then
              npm run build
            fi
          fi
          echo "✅ 项目构建完成"

      - name: 执行 CodeQL 分析
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
          upload: true

      - name: 输出扫描结果摘要
        run: |
          echo "========================================"
          echo "🔒 CodeQL 安全扫描完成"
          echo "========================================"
          echo "扫描语言: ${{ matrix.language }}"
          echo "触发事件: ${{ github.event_name }}"
          echo "触发分支: ${{ github.ref_name }}"
          echo "提交者: ${{ github.actor }}"
          echo "========================================"
          echo "ℹ️ 详细扫描结果请查看 GitHub Security 选项卡"
          echo "ℹ️ 发现的安全问题会自动创建 Issues"
          echo "========================================"
