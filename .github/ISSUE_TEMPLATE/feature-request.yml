name: 功能需求
description: 为项目提出新功能建议
title: "[Feature] "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢您花时间提出功能建议！请尽可能详细描述您的想法。

  - type: checkboxes
    id: prerequisites
    attributes:
      label: 前置检查
      options:
        - label: 我已经搜索了现有的 [Issues](https://github.com/xiejianjun000/open-taiji/issues) 和 [Discussions](https://github.com/xiejianjun000/open-taiji/discussions)，没有找到类似的建议
          required: true

  - type: dropdown
    id: feature-type
    attributes:
      label: 功能类型
      options:
        - "核心功能"
        - "性能优化"
        - "开发者体验"
        - "文档改进"
        - "测试覆盖"
        - "CI/CD 改进"
        - "其他"
    validations:
      required: true

  - type: textarea
    id: problem-description
    attributes:
      label: 问题描述
      description: 这个功能是为了解决什么问题？
      placeholder: 我在使用过程中遇到了...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 建议方案
      description: 你希望如何实现这个功能？
      placeholder: 我建议添加一个...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你考虑过哪些其他的实现方式？

  - type: textarea
    id: use-case
    attributes:
      label: 使用场景
      description: 这个功能的典型使用场景是什么？
      placeholder: 当用户需要...

  - type: dropdown
    id: priority
    attributes:
      label: 优先级
      options:
        - "高 - 没有这个功能无法使用"
        - "中 - 能显著提升体验"
        - "低 - 锦上添花"
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: 贡献意愿
      options:
        - label: 我愿意提交 PR 实现这个功能
