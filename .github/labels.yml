# Labels Configuration for OpenTaiji
# 使用 Labeler Action 管理标签：https://github.com/actions/labeler

labels:
  # ----- 类型标签 -----
  - name: "bug"
    color: "d73a4a"
    description: "Bug 报告 - 代码或功能有问题"
  
  - name: "enhancement"
    color: "a2eeef"
    description: "功能增强 - 新功能或改进"
  
  - name: "documentation"
    color: "0075ca"
    description: "文档相关"
  
  - name: "question"
    color: "d876e3"
    description: "问题讨论"
  
  - name: "performance"
    color: "fef2c0"
    description: "性能优化"
  
  - name: "refactor"
    color: "b4b4ac"
    description: "代码重构"
  
  - name: "test"
    color: "b1fc00"
    description: "测试相关"
  
  - name: "ci"
    color: "4287f5"
    description: "CI/CD 相关"
  
  - name: "dependencies"
    color: "0366d6"
    description: "依赖更新"
  
  # ----- 状态标签 -----
  - name: "needs-triage"
    color: "fbca04"
    description: "需要分类 - 新提交的 Issue/PR 等待审查"
  
  - name: "needs-review"
    color: "f29513"
    description: "需要审核"
  
  - name: "needs-more-info"
    color: "d93f0b"
    description: "需要更多信息"
  
  - name: "in-progress"
    color: "fcd44f"
    description: "正在处理中"
  
  - name: "on-hold"
    color: "e4e669"
    description: "暂停处理"
  
  - name: "blocked"
    color: "e99695"
    description: "被阻塞"
  
  - name: "ready-to-merge"
    color: "0e8a16"
    description: "可以合并"
  
  # ----- 优先级标签 -----
  - name: "priority-critical"
    color: "b60205"
    description: "紧急 - 需要立即处理"
  
  - name: "priority-high"
    color: "e99695"
    description: "高优先级"
  
  - name: "priority-medium"
    color: "f9d0c4"
    description: "中等优先级"
  
  - name: "priority-low"
    color: "c5def5"
    description: "低优先级"
  
  # ----- 难度标签 -----
  - name: "good-first-issue"
    color: "7057ff"
    description: "适合新手 - 简单易上手"
  
  - name: "help-wanted"
    color: "008672"
    description: "需要帮助 - 欢迎贡献"
  
  - name: "difficulty-easy"
    color: "c2e0c6"
    description: "难度 - 简单"
  
  - name: "difficulty-medium"
    color: "fef2c0"
    description: "难度 - 中等"
  
  - name: "difficulty-hard"
    color: "f9d0c4"
    description: "难度 - 困难"
  
  # ----- 模块标签 -----
  - name: "module-core"
    color: "bfdadc"
    description: "核心模块"
  
  - name: "module-gateway"
    color: "bfd4f2"
    description: "网关模块"
  
  - name: "module-cli"
    color: "d4c5f9"
    description: "CLI 模块"
  
  - name: "module-agent"
    color: "f9d5c6"
    description: "Agent 模块"
  
  - name: "module-website"
    color: "e99695"
    description: "网站前端"
  
  - name: "module-tests"
    color: "b1fc00"
    description: "测试模块"
  
  # ----- 其他标签 -----
  - name: "duplicate"
    color: "cfd3d7"
    description: "重复 Issue"
  
  - name: "invalid"
    color: "e4e669"
    description: "无效 - 不符合要求"
  
  - name: "wontfix"
    color: "ffffff"
    description: "不会修复"
  
  - name: "breaking-change"
    color: "e99695"
    description: "破坏性变更"
  
  - name: "security"
    color: "b60205"
    description: "安全相关"
