<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <style>
      @keyframes rotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @keyframes breathe {
        0%, 100% { opacity: 0.9; }
        50% { opacity: 1; }
      }
      .taiji-bg { fill: #0F172A; }
      .outer-ring { stroke: #F59E0B; stroke-width: 2; fill: none; opacity: 0.3; }
      .yin-half { fill: #94A3B8; }
      .yang-half { fill: #F59E0B; }
      .yin-dot { fill: #0F172A; }
      .yang-dot { fill: #0F172A; }
      .glow { filter: drop-shadow(0 0 20px rgba(245, 158, 11, 0.3)); }
    </style>
    <radialGradient id="bgGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </radialGradient>
  </defs>
  
  <!-- 背景 -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGradient)"/>
  
  <!-- 外环装饰 -->
  <circle cx="256" cy="256" r="240" class="outer-ring"/>
  <circle cx="256" cy="256" r="230" class="outer-ring" style="opacity: 0.15;"/>
  
  <!-- 太极主体 -->
  <g class="glow" style="animation: breathe 4s ease-in-out infinite;">
    <!-- 阳半部分（金色，上半圆） -->
    <path d="M256,16 
             A240,240 0 0,1 256,496
             A120,120 0 0,0 256,256
             A120,120 0 0,1 256,16" 
          class="yang-half"/>
    
    <!-- 阴半部分（银色，下半圆） -->
    <path d="M256,16
             A240,240 0 0,0 256,496
             A120,120 0 0,1 256,256
             A120,120 0 0,0 256,16" 
          class="yin-half"/>
    
    <!-- 阳眼（金色部分中的阴点） -->
    <circle cx="256" cy="136" r="28" class="yin-half"/>
    <circle cx="256" cy="136" r="12" class="yin-dot"/>
    
    <!-- 阴眼（银色部分中的阳点） -->
    <circle cx="256" cy="376" r="28" class="yang-half"/>
    <circle cx="256" cy="376" r="12" class="yin-dot"/>
  </g>
  
  <!-- 八卦方位装饰点（微弱） -->
  <g fill="#F59E0B" opacity="0.2">
    <!-- 正北 -->
    <circle cx="256" cy="30" r="4"/>
    <!-- 正南 -->
    <circle cx="256" cy="482" r="4"/>
    <!-- 正东 -->
    <circle cx="482" cy="256" r="4"/>
    <!-- 正西 -->
    <circle cx="30" cy="256" r="4"/>
    <!-- 东北 -->
    <circle cx="414" cy="98" r="4"/>
    <!-- 东南 -->
    <circle cx="414" cy="414" r="4"/>
    <!-- 西北 -->
    <circle cx="98" cy="98" r="4"/>
    <!-- 西南 -->
    <circle cx="98" cy="414" r="4"/>
  </g>
  
</svg>