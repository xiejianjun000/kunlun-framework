<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <style>
      .yin { fill: #94A3B8; }
      .yang { fill: #F59E0B; }
      .bg { fill: #0F172A; }
    </style>
  </defs>
  
  <!-- 背景 -->
  <rect class="bg" width="512" height="512" rx="24"/>
  
  <!-- ☰ 乾卦 - 三横纯阳 - 上排左一 -->
  <g transform="translate(64, 80)">
    <rect class="yang" x="0" y="0" width="128" height="24" rx="4"/>
    <rect class="yang" x="0" y="48" width="128" height="24" rx="4"/>
    <rect class="yang" x="0" y="96" width="128" height="24" rx="4"/>
    <text x="64" y="150" text-anchor="middle" fill="#94A3B8" font-size="16" font-family="sans-serif">乾 · 天</text>
  </g>
  
  <!-- ☷ 坤卦 - 六断纯阴 - 上排左二 -->
  <g transform="translate(256, 80)">
    <rect class="yin" x="0" y="0" width="56" height="24" rx="4"/>
    <rect class="yin" x="72" y="0" width="56" height="24" rx="4"/>
    <rect class="yin" x="0" y="48" width="56" height="24" rx="4"/>
    <rect class="yin" x="72" y="48" width="56" height="24" rx="4"/>
    <rect class="yin" x="0" y="96" width="56" height="24" rx="4"/>
    <rect class="yin" x="72" y="96" width="56" height="24" rx="4"/>
    <text x="64" y="150" text-anchor="middle" fill="#94A3B8" font-size="16" font-family="sans-serif">坤 · 地</text>
  </g>
  
  <!-- ☲ 离卦 - 中虚 - 上排右一 -->
  <g transform="translate(64, 200)">
    <rect class="yang" x="0" y="0" width="128" height="24" rx="4"/>
    <rect class="yin" x="0" y="48" width="56" height="24" rx="4"/>
    <rect class="yin" x="72" y="48" width="56" height="24" rx="4"/>
    <rect class="yang" x="0" y="96" width="128" height="24" rx="4"/>
    <text x="64" y="150" text-anchor="middle" fill="#94A3B8" font-size="16" font-family="sans-serif">离 · 火</text>
  </g>
  
  <!-- ☵ 坎卦 - 中满 - 中排右一 -->
  <g transform="translate(256, 200)">
    <rect class="yin" x="0" y="0" width="56" height="24" rx="4"/>
    <rect class="yin" x="72" y="0" width="56" height="24" rx="4"/>
    <rect class="yang" x="0" y="48" width="128" height="24" rx="4"/>
    <rect class="yin" x="0" y="96" width="56" height="24" rx="4"/>
    <rect class="yin" x="72" y="96" width="56" height="24" rx="4"/>
    <text x="64" y="150" text-anchor="middle" fill="#94A3B8" font-size="16" font-family="sans-serif">坎 · 水</text>
  </g>
  
  <!-- ☶ 艮卦 - 覆碗 - 下排左一 -->
  <g transform="translate(64, 320)">
    <rect class="yin" x="0" y="0" width="56" height="24" rx="4"/>
    <rect class="yin" x="72" y="0" width="56" height="24" rx="4"/>
    <rect class="yin" x="0" y="48" width="56" height="24" rx="4"/>
    <rect class="yin" x="72" y="48" width="56" height="24" rx="4"/>
    <rect class="yang" x="0" y="96" width="128" height="24" rx="4"/>
    <text x="64" y="150" text-anchor="middle" fill="#94A3B8" font-size="16" font-family="sans-serif">艮 · 山</text>
  </g>
  
  <!-- ☳ 震卦 - 仰盂 - 下排左二 -->
  <g transform="translate(256, 320)">
    <rect class="yang" x="0" y="0" width="128" height="24" rx="4"/>
    <rect class="yin" x="0" y="48" width="56" height="24" rx="4"/>
    <rect class="yin" x="72" y="48" width="56" height="24" rx="4"/>
    <rect class="yin" x="0" y="96" width="56" height="24" rx="4"/>
    <rect class="yin" x="72" y="96" width="56" height="24" rx="4"/>
    <text x="64" y="150" text-anchor="middle" fill="#94A3B8" font-size="16" font-family="sans-serif">震 · 雷</text>
  </g>
  
  <!-- ☴ 巽卦 - 下断 - 上排右一（补充位置） -->
  <g transform="translate(64, 440)">
    <rect class="yin" x="0" y="0" width="56" height="24" rx="4"/>
    <rect class="yin" x="72" y="0" width="56" height="24" rx="4"/>
    <rect class="yang" x="0" y="48" width="128" height="24" rx="4"/>
    <rect class="yang" x="0" y="96" width="128" height="24" rx="4"/>
    <text x="64" y="150" text-anchor="middle" fill="#94A3B8" font-size="16" font-family="sans-serif">巽 · 风</text>
  </g>
  
  <!-- ☱ 兑卦 - 上缺 - 下排右一（补充位置） -->
  <g transform="translate(256, 440)">
    <rect class="yang" x="0" y="0" width="128" height="24" rx="4"/>
    <rect class="yang" x="0" y="48" width="128" height="24" rx="4"/>
    <rect class="yin" x="0" y="96" width="56" height="24" rx="4"/>
    <rect class="yin" x="72" y="96" width="56" height="24" rx="4"/>
    <text x="64" y="150" text-anchor="middle" fill="#94A3B8" font-size="16" font-family="sans-serif">兑 · 泽</text>
  </g>
  
</svg>