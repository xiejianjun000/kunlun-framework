# ============================================
# OpenTaiji - 构建验证工作流
# 验证 TypeScript 编译成功，确保可发布状态
# ============================================

name: Build Verification

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

jobs:
  build:
    name: Build Verification
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]
        os: [ubuntu-latest]

    steps:
      - name: Checkout代码
        uses: actions/checkout@v4

      - name: 设置 Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: 安装依赖
        run: npm ci

      - name: TypeScript 编译构建
        run: npm run build

      - name: 验证构建产物
        run: |
          if [ ! -d "dist" ]; then
            echo "❌ dist 目录不存在，构建失败"
            exit 1
          fi
          if [ ! -f "dist/index.js" ]; then
            echo "❌ dist/index.js 不存在，构建失败"
            exit 1
          fi
          echo "✅ 构建验证通过"
          echo "文件统计:"
          find dist -name "*.js" | wc -l
          find dist -name "*.d.ts" | wc -l

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: dist/
          retention-days: 7
