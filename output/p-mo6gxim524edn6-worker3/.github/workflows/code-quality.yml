# ============================================
# OpenTaiji - 代码质量检查工作流
# ESLint 代码检查、安全扫描、依赖审计
# ============================================

name: Code Quality

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'src/**/*.ts'
      - 'tests/**/*.ts'
      - '.eslintrc.*'
      - 'package*.json'
  pull_request:
    branches: [main, master, develop]
    paths:
      - 'src/**/*.ts'
      - 'tests/**/*.ts'
      - '.eslintrc.*'
      - 'package*.json'
  workflow_dispatch:

jobs:
  lint:
    name: ESLint Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: 安装依赖
        run: npm ci

      - name: 运行 ESLint
        run: npm run lint

  dependency-audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: npm 依赖安全审计
        run: npm audit --audit-level=moderate
        continue-on-error: true

  lockfile-lint:
    name: Lockfile Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout代码
        uses: actions/checkout@v4

      - name: 验证 package-lock.json 完整性
        run: |
          if ! node -e "require('./package-lock.json')" 2>/dev/null; then
            echo "❌ package-lock.json 格式无效"
            exit 1
          fi
          echo "✅ package-lock.json 格式有效"
