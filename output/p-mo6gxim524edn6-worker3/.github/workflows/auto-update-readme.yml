# ============================================
# OpenTaiji - README 自动更新工作流
# 当代码、配置或测试覆盖率变更时，自动更新 README
# ============================================

name: Auto Update README

on:
  push:
    branches: [main, master, develop]
    paths:
      # 版本变更
      - 'package.json'
      # 源码变更影响模块列表
      - 'src/**/*.ts'
      # 测试覆盖率变更
      - 'coverage/**'
      # 配置变更
      - 'markdown.config.js'
      - 'jest.config.js'
    paths-ignore:
      # 避免无限循环
      - 'README.md'

  # 允许手动触发
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    name: 自动更新 README 文档
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4
        with:
          # 获取完整历史以支持 git 操作
          fetch-depth: 0
          # 使用 Personal Access Token 以触发后续工作流
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: 安装依赖
        run: npm ci

      - name: 生成测试覆盖率报告
        run: |
          npm run test:coverage
          echo "✅ 覆盖率报告生成完成"

      - name: 运行 markdown-magic 更新 README
        id: update
        run: |
          npm run docs:update
          echo "status=success" >> $GITHUB_OUTPUT

      - name: 检查是否有变更
        id: git-diff
        run: |
          git diff --exit-code README.md > /dev/null
          if [ $? -eq 1 ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "✅ README.md 有更新内容"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "ℹ️ README.md 无变更，跳过提交"
          fi

      - name: 配置 Git 身份
        if: steps.git-diff.outputs.changed == 'true'
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

      - name: 提交变更到仓库
        if: steps.git-diff.outputs.changed == 'true'
        run: |
          git add README.md
          git commit -m "docs: 自动更新 README [skip ci]" -m "Auto-generated by markdown-magic via GitHub Actions"
          git push origin ${{ github.ref_name }}
          echo "✅ 变更已提交并推送"

      - name: 输出执行结果
        run: |
          echo "========================================"
          echo "📊 执行结果总结"
          echo "========================================"
          echo "状态: ${{ steps.update.outputs.status }}"
          echo "是否有变更: ${{ steps.git-diff.outputs.changed }}"
          echo "触发分支: ${{ github.ref_name }}"
          echo "提交者: ${{ github.actor }}"
          echo "========================================"
