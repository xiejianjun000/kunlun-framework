# OpenTaiji Project - Docker Compose Infrastructure
# Complete local development and testing infrastructure

version: '3.8'

networks:
  opentaiji-internal:
    internal: true
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  # CI/CD
  opentaiji-cicd-config:
  opentaiji-cicd-logs:

  # Test Environment
  opentaiji-test-data:

  # Performance Testing
  opentaiji-perf-scripts:

  # Documentation
  opentaiji-docs-html:

  # Monitoring
  opentaiji-prometheus-config:
  opentaiji-prometheus-data:
  opentaiji-grafana-data:

services:
  # CI/CD Server (4 CPU / 8GB RAM)
  cicd-runner:
    image: gitlab/gitlab-runner:latest
    container_name: opentaiji-cicd-runner
    networks:
      - opentaiji-internal
    volumes:
      - opentaiji-cicd-config:/etc/gitlab-runner
      - opentaiji-cicd-logs:/var/log/gitlab-runner
      - /var/run/docker.sock:/var/run/docker.sock
    restart: always
    cpus: '4'
    mem_limit: 8g
    labels:
      - "org.opentaiji.role=cicd"
      - "org.opentaiji.cpu=4"
      - "org.opentaiji.memory=8GB"

  # Test Environment (8 CPU / 16GB RAM)
  test-environment:
    image: nginx:stable-alpine
    container_name: opentaiji-test-env
    networks:
      - opentaiji-internal
    ports:
      - "8080:80"
    volumes:
      - opentaiji-test-data:/usr/share/nginx/html:ro
    restart: always
    cpus: '8'
    mem_limit: 16g
    labels:
      - "org.opentaiji.role=test-environment"
      - "org.opentaiji.cpu=8"
      - "org.opentaiji.memory=16GB"

  # Performance Test Environment (16 CPU / 32GB RAM)
  perf-test:
    image: grafana/k6:latest
    container_name: opentaiji-perf-test
    command: ["sleep", "infinity"]
    networks:
      - opentaiji-internal
    volumes:
      - opentaiji-perf-scripts:/scripts
    restart: always
    cpus: '16'
    mem_limit: 32g
    ports:
      - "6563:6563"
    labels:
      - "org.opentaiji.role=performance-test"
      - "org.opentaiji.cpu=16"
      - "org.opentaiji.memory=32GB"

  # Documentation Server (2 CPU / 4GB RAM)
  docs-server:
    image: nginx:stable-alpine
    container_name: opentaiji-docs
    networks:
      - opentaiji-internal
    ports:
      - "8081:80"
    volumes:
      - opentaiji-docs-html:/usr/share/nginx/html:ro
    restart: always
    cpus: '2'
    mem_limit: 4g
    labels:
      - "org.opentaiji.role=documentation"
      - "org.opentaiji.cpu=2"
      - "org.opentaiji.memory=4GB"

  # Prometheus Monitoring (2 CPU / 4GB RAM)
  prometheus:
    image: prom/prometheus:latest
    container_name: opentaiji-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - opentaiji-internal
    ports:
      - "9090:9090"
    volumes:
      - ../../monitoring:/etc/prometheus
      - opentaiji-prometheus-data:/prometheus
    restart: always
    cpus: '2'
    mem_limit: 4g
    depends_on:
      - node-exporter
    labels:
      - "org.opentaiji.role=monitoring-prometheus"
      - "org.opentaiji.cpu=2"
      - "org.opentaiji.memory=4GB"

  # Grafana (2 CPU / 4GB RAM) - Total 4 CPU / 8GB RAM for monitoring
  grafana:
    image: grafana/grafana:latest
    container_name: opentaiji-grafana
    networks:
      - opentaiji-internal
    ports:
      - "3000:3000"
    volumes:
      - opentaiji-grafana-data:/var/lib/grafana
      - ../../monitoring/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    restart: always
    cpus: '2'
    mem_limit: 4g
    depends_on:
      - prometheus
    labels:
      - "org.opentaiji.role=monitoring-grafana"
      - "org.opentaiji.cpu=2"
      - "org.opentaiji.memory=4GB"

  # Node Exporter for host monitoring
  node-exporter:
    image: prom/node-exporter:latest
    container_name: opentaiji-node-exporter
    networks:
      - opentaiji-internal
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    restart: always
    ports:
      - "9100:9100"
    labels:
      - "org.opentaiji.role=monitoring-node-exporter"

  # cAdvisor for container monitoring
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: opentaiji-cadvisor
    networks:
      - opentaiji-internal
    ports:
      - "8082:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    restart: always
    labels:
      - "org.opentaiji.role=monitoring-cadvisor"
