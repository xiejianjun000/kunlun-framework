# OpenTaiji 生产级部署配置 v1.0
# 完美级交付标准

version: '3.8'

networks:
  opentaiji-internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16

volumes:
  # 持久化数据卷
  opentaiji-postgres-data:
  opentaiji-redis-data:
  opentaiji-prometheus-data:
  opentaiji-grafana-data:
  opentaiji-logs:

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: opentaiji-postgres
    networks:
      - opentaiji-internal
    environment:
      POSTGRES_USER: opentaiji
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme-in-production}
      POSTGRES_DB: opentaiji
    volumes:
      - opentaiji-postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opentaiji"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G

  # Redis 缓存和队列
  redis:
    image: redis:7-alpine
    container_name: opentaiji-redis
    networks:
      - opentaiji-internal
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme-in-production} --maxmemory 2gb --maxmemory-policy allkeys-lru
    volumes:
      - opentaiji-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G

  # OpenTaiji 主应用
  app:
    build:
      context: ../..
      dockerfile: deployment/cloud-machine/Dockerfile
    container_name: opentaiji-app
    networks:
      - opentaiji-internal
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: opentaiji
      DB_PASSWORD: ${DB_PASSWORD:-changeme-in-production}
      DB_NAME: opentaiji
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme-in-production}
      LOG_LEVEL: info
      METRICS_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - opentaiji-logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
      replicas: 2

  # Prometheus 监控
  prometheus:
    image: prom/prometheus:latest
    container_name: opentaiji-prometheus
    networks:
      - opentaiji-internal
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    volumes:
      - ../../monitoring/prometheus-prod.yml:/etc/prometheus/prometheus.yml:ro
      - opentaiji-prometheus-data:/prometheus
    depends_on:
      - app
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G

  # cAdvisor 容器监控
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: opentaiji-cadvisor
    networks:
      - opentaiji-internal
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G

  # Grafana 可视化
  grafana:
    image: grafana/grafana:latest
    container_name: opentaiji-grafana
    networks:
      - opentaiji-internal
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme-in-production}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ../../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - opentaiji-grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G

  # Nginx 反向代理
  nginx:
    image: nginx:stable-alpine
    container_name: opentaiji-nginx
    networks:
      - opentaiji-internal
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
