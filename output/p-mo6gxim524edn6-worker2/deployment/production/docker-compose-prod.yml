# =========================================
# OpenTaiji 生产级完整部署配置 v1.0
# 7层高可用服务集群
# =========================================

version: '3.8'

networks:
  opentaiji-internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
  opentaiji-public:
    driver: bridge

volumes:
  # 持久化数据卷
  opentaiji-postgres-data:
  opentaiji-redis-data:
  opentaiji-prometheus-data:
  opentaiji-grafana-data:
  opentaiji-logs:
  opentaiji-uploads:

services:
  # =========================================
  # 1. PostgreSQL 主数据库
  # =========================================
  postgres:
    image: postgres:15-alpine
    container_name: opentaiji-postgres
    restart: unless-stopped
    networks:
      - opentaiji-internal
    environment:
      POSTGRES_USER: ${DB_USER:-opentaiji}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-opentaiji_prod_secure_password_2026}
      POSTGRES_DB: ${DB_NAME:-opentaiji_production}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - opentaiji-postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-opentaiji} -d ${DB_NAME:-opentaiji_production}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  # =========================================
  # 2. Redis 缓存与消息队列
  # =========================================
  redis:
    image: redis:7-alpine
    container_name: opentaiji-redis
    restart: unless-stopped
    networks:
      - opentaiji-internal
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-opentaiji_redis_secure_2026}
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - opentaiji-redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  # =========================================
  # 3. OpenTaiji 主应用服务
  # =========================================
  app:
    build:
      context: ../..
      dockerfile: deployment/cloud-machine/Dockerfile
    container_name: opentaiji-app
    restart: unless-stopped
    networks:
      - opentaiji-internal
      - opentaiji-public
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - opentaiji-logs:/app/logs
      - opentaiji-uploads:/app/uploads
    ports:
      - "3000:3000"
      # 消息平台webhook端口
      - "3001:3001" # Feishu
      - "3002:3002" # WeChat
      - "3003:3003" # WeCom
      - "3004:3004" # DingTalk
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      mode: replicated
      replicas: 2
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '1'
          memory: 2G
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  # =========================================
  # 4. Prometheus 监控采集
  # =========================================
  prometheus:
    image: prom/prometheus:latest
    container_name: opentaiji-prometheus
    restart: unless-stopped
    networks:
      - opentaiji-internal
      - opentaiji-public
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    volumes:
      - ../../monitoring/prometheus-prod.yml:/etc/prometheus/prometheus.yml:ro
      - ../../monitoring/alerts:/etc/prometheus/rules:ro
      - opentaiji-prometheus-data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - app
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  # =========================================
  # 5. cAdvisor 容器资源监控
  # =========================================
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: opentaiji-cadvisor
    restart: unless-stopped
    networks:
      - opentaiji-internal
      - opentaiji-public
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8080:8080"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  # =========================================
  # 6. Grafana 可视化监控面板
  # =========================================
  grafana:
    image: grafana/grafana:latest
    container_name: opentaiji-grafana
    restart: unless-stopped
    networks:
      - opentaiji-internal
      - opentaiji-public
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-OpenTaiji@2026!}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: "grafana-piechart-panel,grafana-worldmap-panel"
    volumes:
      - ../../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - opentaiji-grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  # =========================================
  # 7. Nginx 反向代理与负载均衡
  # =========================================
  nginx:
    image: nginx:stable-alpine
    container_name: opentaiji-nginx
    restart: unless-stopped
    networks:
      - opentaiji-internal
      - opentaiji-public
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
