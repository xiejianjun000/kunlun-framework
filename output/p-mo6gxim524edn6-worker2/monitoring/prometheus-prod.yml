# OpenTaiji 生产级 Prometheus 配置 v1.0
# 完美级交付标准

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: production
    service: opentaiji

# 告警规则文件
rule_files:
  - "/etc/prometheus/rules/*.yml"

# 告警管理器配置
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - alertmanager:9093

# 采集配置
scrape_configs:
  # Prometheus 自身监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # OpenTaiji 应用指标
  - job_name: 'opentaiji-app'
    static_configs:
      - targets: ['app:3000']
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

  # cAdvisor 容器监控
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    scrape_interval: 15s

  # PostgreSQL 数据库指标
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:9187']
    scrape_interval: 30s

  # Redis 缓存指标
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:9121']
    scrape_interval: 30s

  # LLM 适配器专用指标
  - job_name: 'llm-adapters'
    static_configs:
      - targets: ['app:3000']
    metrics_path: '/metrics/adapters'
    scrape_interval: 5s

  # 技能系统专用指标
  - job_name: 'skill-system'
    static_configs:
      - targets: ['app:3000']
    metrics_path: '/metrics/skills'
    scrape_interval: 5s

  # 成果调度器专用指标
  - job_name: 'outcome-scheduler'
    static_configs:
      - targets: ['app:3000']
    metrics_path: '/metrics/scheduler'
    scrape_interval: 10s
