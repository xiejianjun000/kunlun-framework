# OpenTaiji 生产级告警规则 v1.0
# 完美级交付标准

groups:
  # 服务可用性告警
  - name: service-availability
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "服务 {{ $labels.job }} 不可用"
          description: "{{ $labels.instance }} 已经连续1分钟无法采集"

      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "高错误率告警"
          description: "过去5分钟错误率超过5%，当前值: {{ $value | humanizePercentage }}"

  # 性能告警
  - name: performance
    rules:
      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 0.5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "P95延迟过高"
          description: "P95请求延迟超过500ms，当前值: {{ $value }}s"

      - alert: SkillExecutionSlow
        expr: histogram_quantile(0.95, rate(skill_execution_duration_seconds_bucket[5m])) > 2
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "技能执行缓慢"
          description: "P95技能执行时间超过2秒，当前值: {{ $value }}s"

      - alert: LLMAdapterSlow
        expr: histogram_quantile(0.95, rate(llm_adapter_duration_seconds_bucket[5m])) > 5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "LLM适配器响应缓慢"
          description: "P95适配器响应时间超过5秒，当前值: {{ $value }}s"

  # 资源使用告警
  - name: resources
    rules:
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "CPU使用率过高"
          description: "CPU使用率超过80%，当前值: {{ $value }}%"

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "内存使用率过高"
          description: "内存使用率超过85%，当前值: {{ $value }}%"

      - alert: LowDiskSpace
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"} * 100) < 10
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "磁盘空间不足"
          description: "根分区剩余空间不足10%，当前值: {{ $value }}%"

      - alert: ContainerOOMKilled
        expr: rate(container_last_seen{container_label_org_opentaiji_role=~".+"}[5m]) > 0 and container_memory_failures_total{container_label_org_opentaiji_role=~".+"} > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "容器OOM被杀死"
          description: "容器 {{ $labels.container_label_org_opentaiji_role }} 因内存溢出被系统杀死"

  # LLM 适配器特定告警
  - name: llm-adapters
    rules:
      - alert: HighAdapterFailureRate
        expr: rate(llm_adapter_requests_total{status="error"}[5m]) / rate(llm_adapter_requests_total[5m]) > 0.1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "适配器高失败率"
          description: "{{ $labels.adapter }} 适配器失败率超过10%，当前值: {{ $value | humanizePercentage }}"

      - alert: AdapterCircuitBreakerTripped
        expr: llm_adapter_circuit_breaker_open == 1
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "适配器熔断器触发"
          description: "{{ $labels.adapter }} 适配器熔断器已触发，请求被暂时熔断"

      - alert: HighCostSpike
        expr: rate(llm_adapter_cost_usd_total[1h]) > 100
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "成本突增告警"
          description: "过去1小时API成本超过$100，当前速率: ${{ $value }}/小时"

  # 技能系统特定告警
  - name: skill-system
    rules:
      - alert: SkillFailureRate
        expr: rate(skill_execution_total{status="failed"}[5m]) / rate(skill_execution_total[5m]) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "技能高失败率"
          description: "{{ $labels.skill }} 技能失败率超过5%，当前值: {{ $value | humanizePercentage }}"

      - alert: SkillTimeout
        expr: increase(skill_execution_timeout_total[5m]) > 3
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "技能超时频繁"
          description: "过去5分钟有 {{ $value }} 个技能执行超时"

  # 成果调度器特定告警
  - name: scheduler
    rules:
      - alert: SchedulerJobFailed
        expr: increase(scheduler_job_failed_total[5m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "调度任务失败"
          description: "任务 {{ $labels.job_name }} 执行失败，请检查重试状态"

      - alert: PushDeliveryFailed
        expr: rate(push_delivery_failed_total[5m]) / rate(push_delivery_total[5m]) > 0.1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "消息推送高失败率"
          description: "{{ $labels.channel }} 渠道推送失败率超过10%，当前值: {{ $value | humanizePercentage }}"

  # WFGY 幻觉检测告警
  - name: wfgy-detection
    rules:
      - alert: HighHallucinationRate
        expr: rate(wfgy_hallucination_detected_total[1h]) / rate(wfgy_verification_total[1h]) > 0.15
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "幻觉检出率过高"
          description: "WFGY检测到的幻觉率超过15%，当前值: {{ $value | humanizePercentage }}"
