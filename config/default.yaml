# OpenTaiji - 默认配置
# OpenTaiji Default Configuration
#
# 本配置适用于开发、测试环境
# 生产环境请使用 production.yaml

# ============================================
# 应用配置
# ============================================
app:
  name: "OpenTaiji"
  version: "1.0.0"
  env: "development"
  port: 3000
  host: "0.0.0.0"

# ============================================
# 多租户配置
# ============================================
multiTenant:
  # 是否启用多租户
  enabled: true
  
  # 隔离级别
  # - strict: 完全隔离（推荐生产环境）
  # - standard: 标准隔离（默认）
  # - shared: 共享资源（仅开发测试）
  isolationLevel: "standard"
  
  # 默认配额
  defaultQuota:
    maxUsers: 100
    maxSkillsPerUser: 50
    maxMemoryStorage: 10000
    maxApiCalls: 1000

# ============================================
# 技能系统配置
# ============================================
skillSystem:
  # 技能存储根目录
  skillsRoot: "./skills"
  
  # 注册表存储路径
  registryPath: "./data/skill-registry.json"
  
  # 临时目录
  tempDir: "./temp"
  
  # 隔离环境类型
  # - venv: Python虚拟环境
  # - container: Docker容器隔离
  # - process: 进程隔离（默认）
  isolationType: "process"
  
  # 签名验证
  enableSignatureVerification: false
  
  # 配额管理
  enableQuotaManagement: true
  defaultQuotaLimits:
    maxSkills: 50
    maxConcurrentExecutions: 10
    maxDailyExecutions: 1000
  
  # 执行配置
  execution:
    defaultTimeout: 30000
    defaultMemoryLimit: 512
    maxRetries: 3

# ============================================
# 记忆系统配置
# ============================================
memorySystem:
  # 向量数据库配置
  vectorDb:
    # 适配器类型: qdrant, chroma, local
    adapter: "local"
    
    # Qdrant配置（使用Qdrant时）
    qdrant:
      url: "localhost:6333"
      collectionName: "Taiji-memories"
      vectorSize: 1536
    
    # Chroma配置（使用Chroma时）
    chroma:
      path: "./data/chroma"
    
    # 本地配置
    local:
      path: "./data/vectors"
  
  # 存储配置
  store:
    # 数据库类型: sqlite, postgres, mysql
    dbType: "sqlite"
    connectionString: "./data/memory.db"
    
    # 连接池配置
    pool:
      min: 2
      max: 10
      idleTimeout: 30000
  
  # 记忆层级配置
  tiers:
    hot:
      ttl: 86400          # 24小时
      maxSize: 1000
    warm:
      ttl: 604800         # 7天
      maxSize: 5000
    cold:
      ttl: -1            # 永久
      maxSize: -1        # 无限制
  
  # 重要性评分配置
  importanceScoring:
    enable: true
    decayFactor: 0.95
    baseThreshold: 0.3

# ============================================
# 人格系统配置
# ============================================
personalitySystem:
  # 置信度阈值
  confidenceThreshold: 0.7
  
  # 最大证据数量
  maxEvidenceCount: 100
  
  # 更新频率限制（毫秒）
  updateFrequencyLimit: 3600000
  
  # 快照配置
  enableSnapshot: true
  snapshotRetentionDays: 90
  snapshotTypes:
    - full
    - incremental
    - milestone
    - evolution
  
  # 隐私设置
  privacy:
    # 蒸馏级别: strict, standard, relaxed
    distillLevel: "standard"
    # 不蒸馏的话题
    noDistillTopics:
      - personal_financial
      - medical_info
      - auth_credentials

# ============================================
# 进化系统配置
# ============================================
evolutionSystem:
  # 是否启用
  enabled: true
  
  # 调度配置
  scheduler:
    # 自动调度间隔（毫秒）
    interval: 86400000  # 24小时
    # 是否启用
    autoSchedule: true
  
  # 进化策略
  strategies:
    # 遗传算法策略
    genetic:
      populationSize: 50
      mutationRate: 0.1
      crossoverRate: 0.7
      eliteRatio: 0.1
    
    # 梯度策略
    gradient:
      learningRate: 0.01
      batchSize: 32
    
    # 强化学习策略
    reinforcement:
      gamma: 0.99
      epsilon: 0.1
  
  # 适应度配置
  fitness:
    # 目标适应度
    targetFitness: 0.95
    # 最小改进阈值
    minImprovement: 0.01
  
  # 历史记录
  history:
    maxRecords: 1000
    retentionDays: 365

# ============================================
# 心跳系统配置
# ============================================
heartbeat:
  # 是否启用
  enabled: true
  
  # 检查间隔（毫秒）
  interval: 1800000  # 30分钟
  
  # 失败阈值
  failureThreshold: 3
  
  # 启用内置检查器
  enableBuiltinCheckers: true
  
  # 内置检查项
  builtinCheckers:
    - persona_compliance
    - tool_call
    - memory_pollution
    - task_completion
    - system_health
  
  # 通知配置
  notifications:
    enable: true
    channels:
      - console
    thresholds:
      high: 1
      medium: 3
      low: 5

# ============================================
# 安全配置
# ============================================
security:
  # 安全级别
  # - developer: 开发者模式（宽松）
  # - standard: 标准模式（推荐）
  # - enterprise: 企业模式（严格）
  level: "standard"
  
  # 需要审批的操作
  approvalRequired:
    - dangerous_commands
    - sensitive_files
    - system_modifications
    - network_access
  
  # 危险命令检测
  dangerousCommands:
    patterns:
      - "^sudo"
      - "^rm\\s+-rf"
      - "^curl\\s+\\|\\s*bash"
      - "^chmod\\s+777"
  
  # 敏感文件路径
  sensitivePaths:
    - "~/.ssh"
    - "/etc/passwd"
    - ".env"
    - "credentials"
  
  # 操作审计
  audit:
    enable: true
    logPath: "./logs/audit"
    retentionDays: 90

# ============================================
# 日志配置
# ============================================
logger:
  # 日志级别: debug, info, warn, error
  level: "debug"
  
  # 输出方式: console, file, both
  output: "both"
  
  # 文件输出配置
  file:
    path: "./logs"
    maxSize: "10m"
    maxFiles: 10
    compress: true
  
  # 日志格式化
  format: "json"
  
  # 日志分类
  categories:
    - name: "skill"
      level: "debug"
    - name: "memory"
      level: "debug"
    - name: "personality"
      level: "info"
    - name: "evolution"
      level: "info"
    - name: "security"
      level: "warn"
    - name: "heartbeat"
      level: "info"

# ============================================
# 缓存配置
# ============================================
cache:
  # 缓存类型: redis, memory
  type: "memory"
  
  # Redis配置
  redis:
    host: "localhost"
    port: 6379
    password: ""
    db: 0
    keyPrefix: "Taiji:"
  
  # 内存缓存配置
  memory:
    maxSize: 1000
    ttl: 3600
  
  # 缓存策略
  policies:
    - name: "skill-metadata"
      ttl: 3600
      maxSize: 500
    - name: "user-profile"
      ttl: 1800
      maxSize: 1000
    - name: "memory-index"
      ttl: 300
      maxSize: 2000

# ============================================
# 扩展点配置
# ============================================
extensions:
  # 启用扩展点
  enableExtensionPoints: true
  
  # 扩展目录
  directory: "./extensions"
  
  # 自动加载
  autoLoad: true
  
  # 预加载的扩展
  preloaded:
    - "logging-extension"
    - "metrics-extension"

# ============================================
# 监控配置
# ============================================
monitoring:
  # 是否启用
  enable: true
  
  # 指标收集
  metrics:
    enable: true
    port: 9090
    path: "/metrics"
  
  # 健康检查
  health:
    enable: true
    port: 8080
    path: "/health"
  
  # 追踪
  tracing:
    enable: false
    serviceName: "open-taiji"
    exporterEndpoint: ""

# ============================================
# 开发工具配置
# ============================================
devTools:
  # 热重载
  hotReload:
    enable: true
    watchPaths:
      - "./src"
      - "./skills"
  
  # 调试模式
  debug:
    enable: true
    port: 9229
  
  # Mock数据
  mock:
    enable: true
    fixturesPath: "./tests/fixtures"
