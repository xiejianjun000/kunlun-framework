# OpenTaiji Project - Test Workflow
# Separated workflow for just running tests on PRs

name: Test Only

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  test-only:
    name: PR Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.sha }}
          path: test-results/
        if: always()
